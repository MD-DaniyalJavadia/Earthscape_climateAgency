<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>📢 Climate Alerts</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: 'Inter', sans-serif;
    }
    .card {
      background-color: #1e293b;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      border-left: 5px solid #facc15;
    }
    ul {
      margin: 0;
      padding-left: 20px;
    }
    li {
      margin-bottom: 5px;
      list-style-type: none;
      font-size: 16px;
    }
    li.temp::before {
      content: "🔥 ";
      color: #f97316;
    }
    li.humidity::before {
      content: "💧 ";
      color: #0ea5e9;
    }
    li.rain::before {
      content: "☔ ";
      color: #22c55e;
    }
    .no-alert {
      text-align: center;
      padding: 50px;
      font-size: 20px;
      color: #cbd5e1;
    }
    .timestamp {
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>
<body>

  <div class="container my-5">
    <h2 class="mb-4 text-warning">📢 Recent Climate Alerts</h2>
    <div id="alertListContainer"></div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    $(document).ready(function () {
      $.get('/analyst/get-alerts', function (data) {
        const container = $('#alertListContainer');

        if (data.success && data.alerts.length > 0) {
          data.alerts.forEach(entry => {
            const time = new Date(entry.timestamp).toLocaleString();
            const alertList = entry.alerts.map(alert => {
              let cls = '';
              if (alert.toLowerCase().includes('temperature')) cls = 'temp';
              else if (alert.toLowerCase().includes('humidity')) cls = 'humidity';
              else if (alert.toLowerCase().includes('rainfall')) cls = 'rain';
              return `<li class="${cls} text-white">${alert}</li>`;
            }).join('');

            const card = `
              <div class="card">
                <div class="timestamp">📅 ${time} ${entry.username ? ` | 👤 ${entry.username}` : ''}</div>
                <ul>${alertList}</ul>
              </div>`;
            container.append(card);
          });
        } else {
          container.html('<div class="no-alert">✅ No climate alerts found. Everything looks good!</div>');
        }
      });
    });
  </script>
</body>
</html>
