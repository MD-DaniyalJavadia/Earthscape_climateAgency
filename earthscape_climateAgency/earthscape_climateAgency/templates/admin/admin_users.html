<!-- templates/admin/admin_users.html -->
<h4 class="mb-4"><i class="fas fa-users-cog"></i> Manage Users</h4>

<div class="table-responsive">
  <table class="table table-dark table-striped table-bordered text-white align-middle">
    <thead>
      <tr>
        <th>#</th>
        <th>Full Name</th>
        <th>Email</th>
        <th>Role</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="userTableBody">
      {% for user in users %}
      <tr data-id="{{ user._id }}">
        <td>{{ loop.index }}</td>
        <td class="user-name">{{ user.full_name }}</td>
        <td class="user-email">{{ user.email }}</td>
        <td class="user-role">{{ user.role }}</td>
        <td>
          <button class="btn btn-sm btn-warning edit-user" data-id="{{ user._id }}">Edit</button>
          <button class="btn btn-sm btn-danger delete-user" data-id="{{ user._id }}">Delete</button>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

<script>
$(document).ready(function () {
  // 🗑 Delete User
  $(document).off("click", ".delete-user").on("click", ".delete-user", function () {
    const id = $(this).data("id");
    if (confirm("Are you sure you want to delete this user?")) {
      $.post(`/admin/users/delete/${id}`, function () {
        $(`tr[data-id='${id}']`).fadeOut(300, function () { $(this).remove(); });
      });
    }
  });

  // ✏️ Edit User
  $(document).off("click", ".edit-user").on("click", ".edit-user", function () {
    const row = $(this).closest("tr");
    const id = row.data("id");
    const name = prompt("Full Name:", row.find(".user-name").text().trim());
    const email = prompt("Email:", row.find(".user-email").text().trim());
    const role = prompt("Role (admin/analyst):", row.find(".user-role").text().trim());

    if (!name || !email || !role) {
      alert("⚠️ All fields are required.");
      return;
    }

    $.ajax({
      url: `/admin/users/edit/${id}`,
      method: "POST",
      contentType: "application/json",
      data: JSON.stringify({ full_name: name, email: email, role: role }),
      success: function () {
        row.find(".user-name").text(name);
        row.find(".user-email").text(email);
        row.find(".user-role").text(role);
      }
    });
  });
});
</script>
