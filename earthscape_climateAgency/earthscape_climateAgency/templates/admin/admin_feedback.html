<h4 class="mb-4"><i class="fas fa-comments"></i> Feedback Received</h4>

<div class="table-responsive">
  <table class="table table-dark table-bordered table-striped align-middle text-white">
    <thead>
      <tr>
        <th>#</th>
        <th>User</th>
        <th>Message</th>
        <th>Timestamp</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="feedbackTableBody">
      {% for fb in feedbacks %}
      <tr data-id="{{ fb._id }}">
        <td>{{ loop.index }}</td>
        <td>{{ fb.username or 'Anonymous' }}</td>
        <td class="message-cell">{{ fb.message }}</td>
        <td>{{ fb.timestamp.strftime('%d-%b-%Y %I:%M %p') }}</td>
        <td>
          <button class="btn btn-sm btn-warning edit-feedback" data-id="{{ fb._id }}">Edit</button>
          <button class="btn btn-sm btn-danger delete-feedback" data-id="{{ fb._id }}">Delete</button>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

<script>
$(document).ready(function () {
  // ✅ DELETE Feedback
  $(document).off("click", ".delete-feedback").on("click", ".delete-feedback", function () {
    const id = $(this).data("id");
    if (confirm("Are you sure you want to delete this feedback?")) {
      $.post(`/admin/feedback/delete/${id}`, function () {
        $(`tr[data-id='${id}']`).fadeOut(300, function () { $(this).remove(); });
      }).fail(function (xhr) {
        alert("❌ Delete failed: " + xhr.responseText);
      });
    }
  });

  // ✅ EDIT Feedback (fixed for repeating prompt issue)
  $(document).off("click", ".edit-feedback").on("click", ".edit-feedback", function () {
    const row = $(this).closest("tr");
    const id = row.data("id");
    const oldMsg = row.find(".message-cell").text().trim();
    const newMsg = prompt("✏️ Edit the feedback message:", oldMsg);

    if (newMsg === null) return; // Cancelled
    if (newMsg.trim() === "") {
      alert("⚠️ Message cannot be empty.");
      return;
    }

    $.ajax({
      url: `/admin/feedback/edit/${id}`,
      method: "POST",
      contentType: "application/json",
      data: JSON.stringify({ message: newMsg }),
      success: function () {
        row.find(".message-cell").text(newMsg);
      },
      error: function (xhr) {
        alert("❌ Failed to update: " + xhr.responseText);
      }
    });
  });
});
</script>
